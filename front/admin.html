<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width" />
        <title>Poções e Soluções</title>
        <link rel="stylesheet" href="style.css"
    </head>
    <body>
        <div class="page">
            <div class="content-admin">
                <div class="itens-admin">
                    <li class="add-new-item">
                        <h1>Novo Item</h1>
                        <form id="form-new-item">
                        <label for="pname">Nome do Produto:</label>
                        <input type="text" id="pname" name="pname">
                        <label for="pdesc">Descrição:</label>
                        <input type="text" id="pdesc" name="pdesc">
                        <label for="link">URL da Imagem:</label>
                        <input type="url" id="link" name="link">
                        <label for="pprice">Preço do Produto:</label>
                        <input type="number" id="pprice" name="pprice">
                        <input type="submit" value="Adicionar">
                        </form>
                    </li>
                </div>
            </div>
        </div>
    </body>
    <script src="admin.js"></script>
</html>
